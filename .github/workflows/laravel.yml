name: TaskManager API Laravel CI

on:
  push:
    branches:
      - stable
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
      BROADCAST_CONNECTION: log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, fileinfo
          coverage: none

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run build

      - name: Prepare database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Generate app key
        run: php artisan key:generate

      - name: Generate symbolic links
        run: php artisan storage:link

      - name: Run migrations
        run: php artisan migrate --force

      - name: Analyze OpenAPI generation
        run: php artisan scramble:analyze

      - name: Export OpenAPI document
        run: |
          mkdir -p storage/api-docs
          php artisan scramble:export --path=storage/api-docs/api-docs.json

      - name: Run test suite
        run: composer test
